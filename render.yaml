services:
  # 1. Backend API (FastAPI)
  - type: web
    name: codesentinel-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false # Set this in Render Dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false # Set this in Render Dashboard
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        sync: false # Set this in Render Dashboard

  # 2. Frontend (Next.js)
  - type: web
    name: codesentinel-frontend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: codesentinel-backend
          property: host
        # Note: Render's 'host' property will provide the internal URL. 
        # For browser-side calls, you may need to update this to the public URL 
        # (e.g. https://codesentinel-backend.onrender.com) in the Render dashboard.
